[project]
name = "lean-tasksets"
description = "Lean 4 theorem proving task specs and tasksets."
tags = ["taskset", "lean"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev1",
    "prime-sandboxes>=0.2.13",
    "datasets>=3.0.0",
]

[tool.uv.sources]
prime-sandboxes = { git = "https://github.com/primeintellect-ai/prime.git", subdirectory = "packages/prime-sandboxes", rev = "a2d7fbb" }
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lean_tasksets"]
