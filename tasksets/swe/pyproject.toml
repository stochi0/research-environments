[project]
name = "swe-tasksets"
description = "SWE task specs and tasksets: R2E-Gym, SWE-bench, Multi-SWE, OpenSWE."
tags = ["taskset", "swe"]
version = "0.1.1"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev1",
    "prime-sandboxes>=0.2.13",
    "datasets>=3.0.0",
]

[tool.uv.sources]
prime-sandboxes = { git = "https://github.com/primeintellect-ai/prime.git", subdirectory = "packages/prime-sandboxes", rev = "a2d7fbb" }
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }

[project.optional-dependencies]
swebench = ["swebench==4.1.0"]
multiswe = ["multi-swe-bench"]
openswe = ["datasets>=4.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["swe_tasksets"]
