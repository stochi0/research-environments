name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  tests:
    name: All tests
    runs-on: xl-runner
    env:
      PRIME_API_KEY: ${{ secrets.PRIME_API_KEY }}
      PRIME_TEAM_ID: ${{ secrets.PRIME_TEAM_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # Needed to get PR diff

      - name: Detect changed environments
        id: changed-envs
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v47
        with:
          path: environments
          dir_names: true
          dir_names_max_depth: 1
          separator: ","

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export CHANGED_ENVS="${{ steps.changed-envs.outputs.all_changed_files || 'none' }}"
            echo "CHANGED_ENVS: $CHANGED_ENVS"
          fi
          uv run pytest -n auto tests -v
