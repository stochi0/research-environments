[project]
name = "rlm-harness"
description = "RLM agent harness: install script, run command, and Harness factory."
tags = ["harness", "rlm"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["verifiers>=0.1.12.dev3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_harness"]
