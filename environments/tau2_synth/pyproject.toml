[project]
name = "tau2-synth"
description = "τ²-bench with custom synthetic domains (library, fitness_gym, tech_support, cloud_incident_response, daily_planner, ev_charging_support)"
tags = ["tool-agent-user", "tool-use", "multi-turn", "user-sim", "synthetic"]
version = "0.2.0"
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.11.dev0",
    "tau2 @ git+https://github.com/mikasenghaas/tau2-synth.git@798589e",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["tau2_synth.py"]

[tool.hatch.metadata]
allow-direct-references = true

