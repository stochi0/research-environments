[project]
name = "verbatim-copy-rlm"
version = "0.1.0"
description = "Verbatim text copying RLM environment"
tags = ["rl", "rlm", "copying", "benchmark"]
dependencies = [
    "faker>=20.0.0",
    "verifiers>=0.1.8.post2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
verifiers = { git = "https://github.com/PrimeIntellect-ai/verifiers.git", rev = "main" }
