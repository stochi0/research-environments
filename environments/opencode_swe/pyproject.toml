[project]
name = "opencode-swe"
description = "OpenCode SWE environment for solving SWE issues inside Prime Sandboxes."
tags = ["swe", "multi-turn", "sandbox"]
version = "0.3.2"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev3",
    "prime-sandboxes>=0.2.13",
    "swe-tasksets",
    "opencode-harness",
    "swebench==4.1.0",
]

[tool.uv.sources]
prime-sandboxes = { git = "https://github.com/primeintellect-ai/prime.git", subdirectory = "packages/prime-sandboxes", rev = "a2d7fbb" }
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }
swe-tasksets = { path = "../../tasksets/swe", editable = true }
opencode-harness = { path = "../../harnesses/opencode", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencode_swe"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
