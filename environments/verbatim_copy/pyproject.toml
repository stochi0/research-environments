[project]
name = "verbatim-copy"
version = "0.1.1"
description = "Copy auto-generated text verbatim"
tags = ["copying", "single-turn"]
dependencies = [
    "faker>=20.0.0",
    "verifiers>=0.1.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
