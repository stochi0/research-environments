[project]
name = "rlm-skill-openpage"
version = "0.1.0"
description = "Fetch a URL and return the full parsed text."
requires-python = ">=3.10"
dependencies = [
    "httpx",
    "pdfminer-six>=20251107",
]

[project.scripts]
openpage = "openpage.openpage:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openpage"]
