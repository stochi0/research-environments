[project]
name = "tau3-bench"
description = "τ²-bench evaluation environment. Focus on tau-knowledge."
tags = ["tool-agent-user", "tool-use", "multi-turn", "user-sim", "sierra-research"]
version = "0.1.1"
requires-python = ">=3.12,<3.14"
dependencies = [
    "verifiers>=0.1.11.dev0",
    "tau2 @ git+https://github.com/sierra-research/tau2-bench.git@58e5e1ace69302e6982d27014569c03e0ffccdd2",
    "scipy>=1.10.0",
    "rank-bm25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["tau3_bench.py"]

[tool.hatch.metadata]
allow-direct-references = true
