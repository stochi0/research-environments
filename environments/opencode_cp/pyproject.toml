[project]
name = "opencode-cp"
description = "Solve competitive programming problems using OpenCode agent"
tags = ["coding", "opencode", "multi-turn"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers @ git+https://github.com/PrimeIntellect-ai/verifiers.git@c37da47",
    "prime-sandboxes>=0.2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
