[project]
name = "opencode-cp"
description = "Solve competitive programming problems using OpenCode agent via ComposableEnv."
tags = ["coding", "opencode", "multi-turn"]
version = "0.2.2"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev3",
    "prime-sandboxes>=0.2.13",
    "cp-tasksets",
    "opencode-harness",
]

[tool.uv.sources]
prime-sandboxes = { git = "https://github.com/primeintellect-ai/prime.git", subdirectory = "packages/prime-sandboxes", rev = "a2d7fbb" }
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }
cp-tasksets = { path = "../../tasksets/cp", editable = true }
opencode-harness = { path = "../../harnesses/opencode", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencode_cp"]
