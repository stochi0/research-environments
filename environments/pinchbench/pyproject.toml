[project]
name = "pinchbench"
description = "PinchBench benchmark port running OpenClaw inside a verifier sandbox."
tags = ["agent", "multi-turn", "sandbox"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.11",
    "prime-sandboxes>=0.2.19",
    "pyyaml>=6.0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["pinchbench"]

