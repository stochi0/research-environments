[project]
name = "opencode-science"
description = "Solve science problems using OpenCode agent via ComposableEnv."
tags = ["science", "opencode", "multi-turn"]
version = "0.3.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev5",
    "math-verify>=0.8.0",
]

[tool.uv.sources]
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
