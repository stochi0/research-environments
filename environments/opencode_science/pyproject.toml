[project]
name = "opencode-science"
description = "Solve science problems using OpenCode agent via ComposableEnv."
tags = ["science", "opencode", "multi-turn"]
version = "0.3.3"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.13.dev1",
    "math-verify>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opencode_science"]
