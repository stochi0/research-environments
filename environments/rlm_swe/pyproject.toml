[project]
name = "rlm-swe"
description = "RLM agent on SWE tasks (R2E-Gym, SWE-bench)."
tags = ["swe", "multi-turn", "sandbox", "rlm"]
version = "0.2.2"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev5",
    "prime-sandboxes>=0.2.19",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_swe"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
