[project]
name = "rlm-browsecomp"
description = "RLM agent solving BrowseComp browsing-QA tasks inside Prime Sandboxes."
tags = ["rl", "search", "qa", "rlm", "sandbox", "browsecomp"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev5",
    "prime-sandboxes>=0.2.19",
    "datasets>=4.0.0",
    "httpx",
    "openai>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rlm_browsecomp"]

[tool.verifiers.eval]
num_examples = 5
rollouts_per_example = 3
