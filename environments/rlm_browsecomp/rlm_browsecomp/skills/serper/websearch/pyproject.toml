[project]
name = "rlm-skill-websearch"
version = "0.1.0"
description = "Google search via Serper API."
requires-python = ">=3.10"
dependencies = ["httpx"]

[project.scripts]
websearch = "websearch.websearch:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/websearch"]
