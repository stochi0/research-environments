[project]
name = "rlm-skill-open-webpage"
version = "0.1.0"
description = "Fetch a URL and return the full parsed text."
requires-python = ">=3.10"
dependencies = [
    "httpx",
    "pdfminer-six>=20251107",
]

[project.scripts]
open_webpage = "open_webpage.open_webpage:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/open_webpage"]
