[project]
name = "rlm-skill-openpage"
version = "0.1.0"
description = "Fetch a URL summary via Exa."
requires-python = ">=3.10"
dependencies = ["exa_py"]

[project.scripts]
openpage = "openpage.openpage:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openpage"]
