[project]
name = "rlm-skill-websearch"
version = "0.1.0"
description = "Web search via Exa."
requires-python = ">=3.10"
dependencies = ["exa_py"]

[project.scripts]
websearch = "websearch.websearch:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/websearch"]
