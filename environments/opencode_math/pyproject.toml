[project]
name = "opencode-math"
description = "Solve math problems using OpenCode agent"
tags = ["math", "opencode", "multi-turn"]
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers @ git+https://github.com/PrimeIntellect-ai/verifiers.git@c375d9c", 
    "math-verify>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true