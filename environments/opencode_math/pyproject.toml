[project]
name = "opencode-math"
description = "Solve math problems using OpenCode agent via ComposableEnv."
tags = ["math", "opencode", "multi-turn"]
version = "0.3.0"
requires-python = ">=3.10"
dependencies = [
    "verifiers>=0.1.12.dev3",
    "math-verify>=0.8.0",
    "math-tasksets",
    "opencode-harness",
]

[tool.uv.sources]
verifiers = { git = "https://github.com/primeintellect-ai/verifiers.git", branch = "main" }
math-tasksets = { path = "../../tasksets/math", editable = true }
opencode-harness = { path = "../../harnesses/opencode", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
