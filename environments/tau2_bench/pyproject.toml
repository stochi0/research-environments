[project]
name = "tau2-bench"
description = "τ²-bench evaluation environment"
tags = ["tool-agent-user", "tool-use", "multi-turn", "user-sim", "sierra-research"]
version = "0.2.2"
requires-python = ">=3.11"
dependencies = [
    "verifiers>=0.1.11.dev0",
    "tau2 @ git+https://github.com/sierra-research/tau2-bench.git@337326e",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["tau2_bench.py"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.verifiers.eval]
num_examples = -1
rollouts_per_example = 4