# Run with:
#   set -a
#   source .env
#   set +a
#   uv run vf-eval configs/pinchbench.eval.toml

provider = "prime"
model = "anthropic/claude-sonnet-4.5"
env_dir_path = "./environments"
num_examples = -1
rollouts_per_example = 1
max_concurrent = 50

[[eval]]
env_id = "pinchbench"
env_args = { suite = "all" }
